name: Deploy To EC2

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: vars
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/job-selection-tracker-backend:${{ steps.vars.outputs.image_tag }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/job-selection-tracker-frontend:${{ steps.vars.outputs.image_tag }}

      - name: Render deployment files
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ACCESS_TOKEN_EXPIRATION_SECONDS: ${{ secrets.JWT_ACCESS_TOKEN_EXPIRATION_SECONDS }}
          JWT_TOKEN_TYPE: ${{ secrets.JWT_TOKEN_TYPE }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
        run: |
          mkdir -p deploy/rendered
          cp deploy/ec2/docker-compose.prod.yml deploy/rendered/docker-compose.prod.yml
          cat > deploy/rendered/.env <<EOF
          ECR_REGISTRY=${ECR_REGISTRY}
          IMAGE_TAG=${IMAGE_TAG}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB}
          JWT_SECRET=${JWT_SECRET}
          JWT_ACCESS_TOKEN_EXPIRATION_SECONDS=${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS}
          JWT_TOKEN_TYPE=${JWT_TOKEN_TYPE}
          CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
          EOF
          base64 -w 0 deploy/rendered/docker-compose.prod.yml > deploy/rendered/docker-compose.prod.yml.b64
          base64 -w 0 deploy/rendered/.env > deploy/rendered/.env.b64

      - name: Deploy on EC2 via SSM
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          COMPOSE_B64="$(cat deploy/rendered/docker-compose.prod.yml.b64)"
          ENV_B64="$(cat deploy/rendered/.env.b64)"
          jq -n \
            --arg instance_id "$EC2_INSTANCE_ID" \
            --arg comment "Deploy job-selection-tracker ${GITHUB_SHA}" \
            --arg compose_b64 "$COMPOSE_B64" \
            --arg env_b64 "$ENV_B64" \
            --arg aws_region "$AWS_REGION" \
            --arg ecr_registry "$ECR_REGISTRY" \
            '{
              InstanceIds: [$instance_id],
              DocumentName: "AWS-RunShellScript",
              Comment: $comment,
              Parameters: {
                commands: [
                  "set -euo pipefail",
                  "mkdir -p /home/ec2-user/job-selection-tracker",
                  ("echo \u0027" + $compose_b64 + "\u0027 | base64 -d > /home/ec2-user/job-selection-tracker/docker-compose.prod.yml"),
                  ("echo \u0027" + $env_b64 + "\u0027 | base64 -d > /home/ec2-user/job-selection-tracker/.env"),
                  "chown -R ec2-user:ec2-user /home/ec2-user/job-selection-tracker",
                  ("aws ecr get-login-password --region " + $aws_region + " | docker login --username AWS --password-stdin " + $ecr_registry),
                  "cd /home/ec2-user/job-selection-tracker",
                  "docker compose -f docker-compose.prod.yml --env-file .env pull",
                  "docker compose -f docker-compose.prod.yml --env-file .env up -d"
                ]
              }
            }' > deploy/rendered/ssm-command.json
          COMMAND_ID="$(
            aws ssm send-command \
              --region "$AWS_REGION" \
              --cli-input-json file://deploy/rendered/ssm-command.json \
              --query "Command.CommandId" \
              --output text
          )"
          set +e
          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID"
          WAIT_EXIT=$?
          set -e
          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}" \
            --output json
          exit "$WAIT_EXIT"
