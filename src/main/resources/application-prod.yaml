spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

jwt:
  secret: ${JWT_SECRET}

app:
  security:
    public-actuator-paths: /actuator/health,/actuator/health/**

management:
  endpoints:
    web:
      exposure:
        include: health
