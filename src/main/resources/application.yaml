spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/jobtracker
    username: postgres
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: "change-this-secret-key-for-jwt-change-this-secret-key"
  access-token-expiration-seconds: 3600
  token-type: "Bearer"
