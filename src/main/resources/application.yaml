spring:
  profiles:
    default: local
  jpa:
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

jwt:
  access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:3600}
  token-type: ${JWT_TOKEN_TYPE:Bearer}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    name: Job Application Tracker
    description: Backend API for managing job applications and hiring workflows
    version: 0.0.1-SNAPSHOT

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId:-N/A}] %logger{36} - %msg%n"
