spring:
  datasource:
    url: jdbc:h2:mem:jobtracker;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  sql:
    init:
      mode: never

jwt:
  secret: "test-secret-key-for-jwt-test-secret-key-123456"
  access-token-expiration-seconds: 3600
  token-type: "Bearer"
